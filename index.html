<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image to Prompt Generator</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 550px;
            text-align: center;
        }

        h1 { margin-bottom: 0.5rem; font-size: 1.8rem; }
        .subtitle { color: var(--text-muted); margin-bottom: 2rem; font-size: 0.95rem; }

        .drop-zone {
            border: 2px dashed var(--accent);
            border-radius: 12px;
            padding: 2rem;
            cursor: pointer;
            position: relative;
            transition: background 0.3s;
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .drop-zone:hover { background-color: rgba(99, 102, 241, 0.1); }
        .file-input { display: none; }

        #imagePreview {
            max-width: 100%;
            max-height: 250px;
            border-radius: 8px;
        }

        button {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 1.5rem;
            width: 100%;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover:not(:disabled) { background-color: var(--accent-hover); }
        button:disabled { background-color: #475569; cursor: not-allowed; }

        .prompt-box {
            background-color: #0f172a;
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid #334155;
            text-align: left;
            position: relative;
            margin-top: 1rem;
        }

        #promptText { margin: 0; padding-right: 60px; font-size: 0.95rem; line-height: 1.5; color: #e2e8f0; word-break: break-word; }
        #copyBtn { position: absolute; right: 10px; top: 5px; width: auto; padding: 0.4rem 0.8rem; font-size: 0.8rem; margin: 0; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Image to Prompt Generator</h1>
        <p class="subtitle">Upload an image to extract its exact descriptive prompt</p>

        <div class="drop-zone" id="dropZone">
            <span class="drop-zone__prompt">Drag & drop image here or click to upload</span>
            <input type="file" id="fileInput" accept="image/*" class="file-input">
            <img id="imagePreview" src="" alt="Preview" class="hidden">
        </div>

        <button id="generateBtn" disabled>Generate Prompt</button>

        <div id="outputContainer" class="hidden">
            <h3>Generated Prompt:</h3>
            <div class="prompt-box">
                <p id="promptText"></p>
                <button id="copyBtn">Copy</button>
            </div>
        </div>
    </div>

    <script>
        // ⚠️ PASTE YOUR COPIED KEY STARTING WITH "AQ..." HERE
        const API_KEY = 'AQ.Ab8RN6KeeqQEUG1j6l3uFYtIelm-tZrUEGNC6EwTcAzA-C-kZw';

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const imagePreview = document.getElementById('imagePreview');
        const dropZonePrompt = document.querySelector('.drop-zone__prompt');
        const generateBtn = document.getElementById('generateBtn');
        const outputContainer = document.getElementById('outputContainer');
        const promptText = document.getElementById('promptText');
        const copyBtn = document.getElementById('copyBtn');

        let base64Image = null;
        let mimeType = "image/jpeg";

        dropZone.addEventListener('click', (e) => {
            if (e.target !== fileInput) {
                fileInput.click();
            }
        });

        fileInput.addEventListener('change', handleFile);

        function handleFile(e) {
            const file = e.target.files[0];
            if (!file) return;

            mimeType = file.type;

            const reader = new FileReader();
            reader.onload = function(event) {
                imagePreview.src = event.target.result;
                imagePreview.classList.remove('hidden');
                dropZonePrompt.classList.add('hidden');
                
                base64Image = event.target.result.split(',')[1];
                generateBtn.disabled = false;
            };
            reader.readAsDataURL(file);
        }

        generateBtn.addEventListener('click', async () => {
            if (!base64Image || API_KEY.startsWith('YOUR')) {
                alert("Please add your actual copied key inside the code.");
                return;
            }

            generateBtn.disabled = true;
            generateBtn.innerText = "Analyzing Image...";
            outputContainer.classList.add('hidden');

            // Using a CORS-anywhere engine pipeline to authorize direct mobile requests
            const directUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`;
            const url = `https://corsproxy.io/?${encodeURIComponent(directUrl)}`;

            const payload = {
                contents: [{
                    parts: [
                        { text: "Analyze this image perfectly. Write a highly detailed descriptive prompt that can be used in Midjourney, DALL-E 3, or Stable Diffusion to recreate this exact image with nothing changed. Include style, composition, lighting, exact subjects, background, and mood." },
                        {
                            inlineData: {
                                mimeType: mimeType,
                                data: base64Image
                            }
                        }
                    ]
                }]
            };

            try {
                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error ? data.error.message : "Security verification failed.");
                }

                const resultText = data.candidates[0].content.parts[0].text;
                promptText.innerText = resultText;
                outputContainer.classList.remove('hidden');
            } catch (error) {
                console.error(error);
                alert("Processing Notice: " + error.message);
            } finally {
                generateBtn.disabled = false;
                generateBtn.innerText = "Generate Prompt";
            }
        });

        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(promptText.innerText);
            copyBtn.innerText = "Copied!";
            setTimeout(() => copyBtn.innerText = "Copy", 2000);
        });
    </script>
</body>
</html>
